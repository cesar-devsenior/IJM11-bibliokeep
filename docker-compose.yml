services:
  db:
    image: postgres:18-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=bibliokeep_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bibliokeep_db"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s
  
  backend:
    image: bibliokeep-backend
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=bibliokeep_db
      - DB_USER=admin
      - APP_JWT_SECRET=${JWT_SECRET}
      - APP_UPLOAD_DIRECTORY=/files
      - APP_ALLOWED_ORIGINS=http://localhost
    ports:
      - "8091:8080"
    volumes:
      - C:/Users/Docente/Desktop/Java/ImpulsaJava/Modulo9/BiblioKeep/bibliokeep/archivos:/files

  frontend:
    image: bibliokeep-frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
